version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gf-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Guarantee@2024}
      MYSQL_DATABASE: guarantee_finance
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/task7-11-supplement.sql:/docker-entrypoint-initdb.d/02-supplement.sql:ro
    command:
      --max_connections=200
      --innodb_buffer_pool_size=512M
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gf-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-GuaranteeRedis2024}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-GuaranteeRedis2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./guarantee-finance-backend
      dockerfile: Dockerfile
    container_name: gf-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/guarantee_finance?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Guarantee@2024}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-GuaranteeRedis2024}
      JWT_SECRET: ${JWT_SECRET:-guarantee-finance-jwt-secret-key-2024}
      NC_CLOUD_BASE_URL: ${NC_CLOUD_BASE_URL:-http://nc-cloud-server:8080/nccloud}
      NC_CLOUD_USERNAME: ${NC_CLOUD_USERNAME:-admin}
      NC_CLOUD_PASSWORD: ${NC_CLOUD_PASSWORD:-admin123}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_logs:/app/logs
      - ./certs:/app/certs:ro

  frontend:
    build:
      context: ./guarantee-finance-frontend
      dockerfile: Dockerfile
    container_name: gf-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
  backend_logs:

networks:
  default:
    name: gf-network
