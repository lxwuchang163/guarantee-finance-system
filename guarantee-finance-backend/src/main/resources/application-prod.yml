server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,application/javascript,text/css

spring:
  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_URL:-localhost:3306}/guarantee_finance?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${SPRING_DATASOURCE_USERNAME:-root}
    password: ${SPRING_DATASOURCE_PASSWORD:-Guarantee@2024}
    driver-class-name: com.mysql.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  redis:
    host: ${SPRING_REDIS_HOST:-localhost}
    port: ${SPRING_REDIS_PORT:-6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 2
        max-wait: 3000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.guarantee.finance.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: INFO
    com.guarantee.finance: INFO
  file:
    name: ./logs/guarantee-finance.log
    max-size: 100MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

jwt:
  secret: ${JWT_SECRET:-guarantee-finance-jwt-secret-key-change-in-production}
  expiration: 86400000
  refresh-expiration: 604800000

nc:
  cloud:
    base-url: ${NC_CLOUD_BASE_URL:-http://nc-cloud-server:8080/nccloud}
    username: ${NC_CLOUD_USERNAME:-admin}
    password: ${NC_CLOUD_PASSWORD:-admin123}
    client-id: ${NC_CLOUD_CLIENT_ID:-guarantee_finance}
    data-source: ${NC_CLOUD_DATA_SOURCE:-default}
    group-code: ${NC_CLOUD_GROUP_CODE:-JT01}

cfca:
  cert-path: ${CFCA_CERT_PATH:-./certs}
  keystore-password: ${CFCA_KEYSTORE_PASSWORD:-changeit}
  sign-level-thresholds:
    single: 50000
    double: 500000
