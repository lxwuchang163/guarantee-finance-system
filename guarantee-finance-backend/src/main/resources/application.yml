server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: guarantee-finance

  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/guarantee_finance?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123

# 暂时禁用Redis
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password:
#      database: 0
#      timeout: 10000ms
#      lettuce:
#        pool:
#          max-active: 8
#          max-wait: -1ms
#          max-idle: 8
#          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.guarantee.finance.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: guarantee-finance-jwt-secret-key-2024-must-be-long-enough-for-hs256-algorithm
  expiration: 86400000
  header: Authorization
  prefix: Bearer 

logging:
  level:
    com.guarantee.finance: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

knife4j:
  enable: true
  setting:
    language: zh_cn

nc:
  cloud:
    enabled: true
    base-url: http://localhost:8081/nccloud
    username: admin
    password: admin123
    client-id: guarantee_finance_client
    client-secret: guarantee_secret_key_2024
    data-source: guara001
    group-code: GUARANTEE_GROUP
    connect-timeout: 10000
    read-timeout: 30000

# 短信服务配置
sms:
  aliyun:
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    sign-name: your-sign-name
    template-code: your-template-code

# 微信登录配置
wechat:
  app-id: your-app-id
  app-secret: your-app-secret
  redirect-uri: https://finance.example.com/api/auth/wechat/callback
