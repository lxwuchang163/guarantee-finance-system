server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/guarantee_finance_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: test123456
    driver-class-name: com.mysql.cj.jdbc.Driver
